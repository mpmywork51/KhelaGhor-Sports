    <script>
      // Suppress cross-origin "Script error." commonly caused by browser extensions or iframe sandboxing, and benign AbortError
      window.addEventListener('error', function(e) {
        var msg = e.message || "";
        if (msg === "Script error." || !e.filename || msg.indexOf("aborted") !== -1 || msg.indexOf("AbortError") !== -1 || msg.indexOf("aborted a request") !== -1) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
      
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        if (reason) {
          var msg = reason.message || "";
          var name = reason.name || "";
          if (msg === "Script error." || !reason.stack || msg.indexOf("aborted") !== -1 || name === "AbortError" || msg.indexOf("aborted a request") !== -1) {
            e.preventDefault();
          }
        }
      }, true);
    </script>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchValue;
            },
            set: function(val) {
              fetchValue = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch setter:", e);
        }
      })();
    </script>
